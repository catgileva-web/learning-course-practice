<nav class="navbar navbar-expand-lg bg-primary" data-bs-theme="dark">
  <div class="container">
    <a class="navbar-brand" style="cursor: pointer" (click)="toggleDebugPanel()" title="Open debug panel">Demo Project</a>
    <button
      class="navbar-toggler"
      type="button"
      data-bs-toggle="collapse"
      data-bs-target="#navbarNav"
      aria-controls="navbarNav"
      aria-expanded="false"
      aria-label="Toggle navigation"
    >
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav me-auto">
        <li class="nav-item">
          <a class="nav-link" routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">Dashboard</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" routerLink="/list" routerLinkActive="active">Users</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" routerLink="/form" routerLinkActive="active">Add User</a>
        </li>
      </ul>
      <div class="d-flex align-items-center">
        <label class="text-light me-2 mb-0 small">Logged in as:</label>
        <select
          class="form-select form-select-sm"
          [value]="currentUserId$ | async"
          (change)="onUserChange($event)"
        >
          @for (user of users$ | async; track user.id) {
            <option [value]="user.id">{{ user.name }} ({{ user.role }})</option>
          }
        </select>
      </div>
    </div>
  </div>
</nav>

<router-outlet />

<app-debug-panel
  [isOpen]="debugPanelOpen"
  (closePanel)="debugPanelOpen = false"
/>
